name: CI

on:
  push:
    branches: [main, master, beta]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6
      - name: Install Qt/OpenGL runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libxcb-cursor0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run venv CI pipeline
        run: bash scripts/ci_venv.sh
      - name: Check import graph
        run: .venv/bin/python scripts/check_imports.py
      - name: Check documentation parity (UK/EN)
        run: .venv/bin/python scripts/check_doc_parity.py
