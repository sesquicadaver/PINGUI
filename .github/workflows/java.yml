name: Java CI

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

concurrency:
  group: java-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-linux:
    name: check (ubuntu)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gradle check
        run: |
          chmod +x gradlew
          ./gradlew check --no-daemon --stacktrace

  check-windows:
    name: check (windows)
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Gradle check
        run: .\gradlew.bat check --no-daemon --stacktrace
