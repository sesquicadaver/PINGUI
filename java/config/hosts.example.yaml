# Профілі трасування (v2). Legacy `hosts:` list still loads as profile "default".
active_profile: default
profiles:
  default:
    interval: 1.0
    max_hops: 20
    timeout: 0.5
    probe: auto
    hosts:
      - address: "8.8.8.8"
      - address: "1.1.1.1"
      - address: "google.com"
      - address: "cloudflare.com"
      - address: "github.com"
      - address: "ukr.net"
      - address: "kernel.org"
      - address: "debian.org"
      - address: "ubuntu.com"
    # P16-040 — telemetry (all sinks off by default; uncomment to enable)
    # telemetry:
    #   events_only: true          # drop high-freq RTT from remote LOG sinks
    #   log_aggregates: false      # optional 5m avg/max rtt_aggregate events
